<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Spot the right movie, time, place, and price." />
    <title>spotCinema — Movie Showtimes and Prices</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #090b10; color: #f7f7f8; }
      main { width: min(1100px, 92%); margin: 40px auto; }
      h1 { margin: 0 0 8px; font-size: clamp(30px, 5vw, 48px); }
      h2, h3 { margin-top: 0; }
      .muted { color: #a9afbd; }
      .status { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 14px; }
      .badge { padding: 6px 10px; border-radius: 999px; background: #17271f; color: #74e7ad; font-size: 13px; }
      .panel { padding: 22px; margin-top: 24px; background: #141820; border: 1px solid #252b38; border-radius: 18px; }
      .form { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
      label { display: grid; gap: 7px; font-size: 14px; color: #c7cbd4; }
      select, button { width: 100%; min-height: 46px; padding: 10px 12px; border-radius: 10px; border: 1px solid #333b4c; background: #0d1016; color: white; font: inherit; }
      button { width: auto; padding-inline: 24px; cursor: pointer; background: #e31b45; border-color: #e31b45; font-weight: 700; }
      button.secondary { min-height: auto; padding: 6px 12px; background: transparent; border-color: #3a4355; font-size: 13px; }
      button:disabled { opacity: .6; cursor: wait; }
      .area-picker { position: relative; }
      .area-toggle { width: 100%; padding-inline: 12px; overflow: hidden; background: #0d1016; border-color: #333b4c; text-align: right; text-overflow: ellipsis; white-space: nowrap; font-weight: 400; }
      .area-menu { position: absolute; z-index: 10; top: calc(100% + 6px); right: 0; left: 0; max-height: 280px; padding: 8px; overflow-y: auto; background: #10141c; border: 1px solid #3a4355; border-radius: 12px; box-shadow: 0 16px 36px #0009; }
      .area-option { display: flex; grid-template-columns: none; align-items: center; gap: 9px; padding: 9px 8px; border-radius: 8px; color: #f7f7f8; cursor: pointer; }
      .area-option:hover { background: #202635; }
      .area-option input { width: 17px; height: 17px; margin: 0; accent-color: #e31b45; }
      .quick-tools { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-top: 16px; }
      .quick-tools button { width: auto; background: #f2c46f; border-color: #f2c46f; color: #171109; }
      .current-time { padding: 7px 10px; border-radius: 999px; background: #202635; color: #f7f7f8; white-space: nowrap; }
      .location-tools { display: flex; flex-wrap: wrap; align-items: end; gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #252b38; }
      .location-tools button { width: auto; }
      .radius-label { display: flex; align-items: center; gap: 8px; }
      .radius-label select { width: auto; min-width: 110px; }
      .location-status { flex: 1 1 260px; align-self: center; }
      #progress { margin-top: 14px; }
      .summary { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
      .movie-heading { display: flex; align-items: center; gap: 16px; min-width: 0; }
      .poster { width: 82px; aspect-ratio: 2 / 3; flex: 0 0 auto; border-radius: 10px; object-fit: cover; background: #202635; box-shadow: 0 7px 20px #0007; }
      .movie-heading h2 { margin-bottom: 5px; }
      .cinema { padding: 18px 0; border-bottom: 1px solid #2a303d; }
      .cinema:last-child { border-bottom: 0; }
      .cinema-head { display: flex; flex-wrap: wrap; align-items: baseline; justify-content: space-between; gap: 10px; }
      .cinema-place { display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 8px; }
      .location { color: #f2c46f; }
      .distance { padding: 4px 9px; border-radius: 999px; background: #182a3d; color: #84b9ff; font-size: 13px; white-space: nowrap; }
      .recommendation { margin-top: 18px; padding: 20px; border: 1px solid #6d572b; border-radius: 14px; background: linear-gradient(135deg, #2a2315, #181b22); }
      .recommendation-label { color: #f2c46f; font-weight: 700; }
      .recommendation-time { margin: 8px 0 4px; font-size: clamp(24px, 4vw, 34px); font-weight: 800; }
      .recommendation-details { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 12px; }
      .alternatives { margin: 18px 0 0; padding-top: 16px; border-top: 1px solid #2a303d; }
      .alternative { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; padding: 10px 0; }
      .times { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .time { padding: 9px 11px; border-radius: 9px; background: #202635; direction: ltr; }
      .price { color: #74e7ad; font-weight: 700; }
      .unavailable { color: #a9afbd; }
      a { color: #84b9ff; }
      pre { white-space: pre-wrap; direction: ltr; text-align: left; font-size: 12px; overflow: auto; }
      [hidden] { display: none !important; }
      @media (max-width: 900px) { .form { grid-template-columns: 1fr 1fr; } .form button { width: 100%; } }
      @media (max-width: 560px) { main { margin-top: 24px; } .panel { padding: 16px; } .form { grid-template-columns: 1fr; } .quick-tools > button, .location-tools > button, .radius-label, .radius-label select { width: 100%; } }
    </style>
  </head>
  <body>
    <main>
      <h1>spotCinema</h1>
      <div class="muted" dir="ltr">Spot the right movie, time, place, and price.</div>
      <div class="status">
        <span id="freshness" class="badge">جاري تحميل آخر نسخة…</span>
        <span id="stats" class="muted"></span>
        <button id="reload" class="secondary" type="button">تحقق من نسخة أحدث</button>
      </div>

      <section class="panel">
        <div class="form">
          <label>الفيلم<select id="movie" disabled><option>جاري تحميل الأفلام…</option></select></label>
          <label>التاريخ<select id="date" disabled><option>—</option></select></label>
          <label>المحافظة / المدينة<select id="city" disabled><option value="">كل المحافظات والمدن</option></select></label>
          <label>المناطق
            <span class="area-picker">
              <button id="area-toggle" class="area-toggle" type="button" disabled>كل المناطق</button>
              <span id="area-menu" class="area-menu" hidden></span>
            </span>
          </label>
          <button id="search" disabled>اعرض المواعيد</button>
        </div>
        <div class="quick-tools">
          <button id="nearest" type="button" disabled>⏱️ أقرب ميعاد من دلوقتي</button>
          <span id="current-time" class="current-time">الوقت الآن في مصر: —</span>
          <span class="muted">يبحث في كل الأيام المتاحة للفيلم.</span>
        </div>
        <div class="location-tools">
          <button id="locate" type="button" disabled>📍 استخدم موقعي</button>
          <label class="radius-label">في نطاق
            <select id="radius" disabled>
              <option value="5">5 كم</option>
              <option value="10">10 كم</option>
              <option value="25" selected>25 كم</option>
              <option value="50">50 كم</option>
              <option value="100">100 كم</option>
            </select>
          </label>
          <button id="clear-location" class="secondary" type="button" hidden>إلغاء الموقع</button>
          <span id="location-status" class="muted location-status">موقعك يُستخدم داخل المتصفح فقط ولا يتم حفظه.</span>
        </div>
        <div id="progress" class="muted"></div>
      </section>

      <section id="results" class="panel" hidden></section>
      <details class="panel"><summary>عرض بيانات النتيجة JSON</summary><pre id="json">—</pre></details>
    </main>

    <script type="module">
      import { findUpcomingShowings } from "./time-utils.js";

      const elements = {
        movie: document.querySelector("#movie"),
        date: document.querySelector("#date"),
        city: document.querySelector("#city"),
        areaToggle: document.querySelector("#area-toggle"),
        areaMenu: document.querySelector("#area-menu"),
        search: document.querySelector("#search"),
        nearest: document.querySelector("#nearest"),
        currentTime: document.querySelector("#current-time"),
        locate: document.querySelector("#locate"),
        radius: document.querySelector("#radius"),
        clearLocation: document.querySelector("#clear-location"),
        locationStatus: document.querySelector("#location-status"),
        reload: document.querySelector("#reload"),
        freshness: document.querySelector("#freshness"),
        stats: document.querySelector("#stats"),
        progress: document.querySelector("#progress"),
        results: document.querySelector("#results"),
        json: document.querySelector("#json"),
      };
      let snapshot = null;
      let userLocation = null;
      const selectedAreaIds = new Set();

      const escapeHtml = (value) => String(value ?? "").replace(/[&<>\"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[char]);

      function formatDate(value) {
        return new Intl.DateTimeFormat("ar-EG", {
          dateStyle: "full",
          timeZone: "Africa/Cairo",
        }).format(new Date(`${value}T12:00:00+03:00`));
      }

      function formatUpdatedAt(value) {
        return new Intl.DateTimeFormat("ar-EG", {
          dateStyle: "medium",
          timeStyle: "short",
          timeZone: "Africa/Cairo",
        }).format(new Date(value));
      }

      function updateCurrentTime() {
        const time = new Intl.DateTimeFormat("ar-EG", {
          hour: "numeric",
          minute: "2-digit",
          timeZone: "Africa/Cairo",
        }).format(new Date());
        elements.currentTime.textContent = `الوقت الآن في مصر: ${time}`;
      }

      function formatShowingDate(value) {
        return new Intl.DateTimeFormat("ar-EG", {
          dateStyle: "full",
          timeStyle: "short",
          timeZone: "Africa/Cairo",
        }).format(new Date(value));
      }

      function formatWaitingTime(milliseconds) {
        const minutes = Math.max(0, Math.ceil(milliseconds / 60000));
        if (minutes < 60) return `بعد ${minutes} دقيقة`;
        const hours = Math.floor(minutes / 60);
        const remainingMinutes = minutes % 60;
        return remainingMinutes ? `بعد ${hours} ساعة و${remainingMinutes} دقيقة` : `بعد ${hours} ساعة`;
      }

      function cinemaDistanceKm(cinema) {
        if (!userLocation) return null;
        const latitude = Number(cinema.coordinates?.latitude);
        const longitude = Number(cinema.coordinates?.longitude);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
        if (latitude < 20 || latitude > 33 || longitude < 24 || longitude > 37) return null;

        const toRadians = (degrees) => degrees * Math.PI / 180;
        const latitudeDelta = toRadians(latitude - userLocation.latitude);
        const longitudeDelta = toRadians(longitude - userLocation.longitude);
        const startLatitude = toRadians(userLocation.latitude);
        const endLatitude = toRadians(latitude);
        const haversine = Math.sin(latitudeDelta / 2) ** 2
          + Math.cos(startLatitude) * Math.cos(endLatitude) * Math.sin(longitudeDelta / 2) ** 2;
        return 6371 * 2 * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
      }

      function formatDistance(value) {
        if (value < 1) return `${Math.max(1, Math.round(value * 1000))} متر`;
        return `${new Intl.NumberFormat("ar-EG", { maximumFractionDigits: 1 }).format(value)} كم`;
      }

      function selectedMovie() {
        return snapshot?.movies.find((item) => item.id === elements.movie.value);
      }

      function loadDates() {
        const movie = selectedMovie();
        elements.date.innerHTML = (movie?.availableDates || [])
          .map((value) => `<option value="${value}">${escapeHtml(formatDate(value))}</option>`)
          .join("");
        elements.date.disabled = !movie?.availableDates?.length;
      }

      function loadAreas() {
        const areas = snapshot?.locations?.areasByCity?.[elements.city.value] || [];
        selectedAreaIds.clear();
        elements.areaMenu.innerHTML = areas
          .map((item) => `<label class="area-option"><input type="checkbox" value="${item.id}"><span>${escapeHtml(item.nameAr || item.nameEn)}</span></label>`)
          .join("");
        elements.areaToggle.disabled = !elements.city.value || !areas.length;
        elements.areaMenu.hidden = true;
        updateAreaLabel();
      }

      function updateAreaLabel() {
        const selectedNames = [...elements.areaMenu.querySelectorAll("input:checked")]
          .map((input) => input.nextElementSibling.textContent);
        elements.areaToggle.textContent = selectedNames.length
          ? selectedNames.length === 1 ? selectedNames[0] : `${selectedNames.length} مناطق مختارة`
          : "كل المناطق";
      }

      function renderTimes(showtimes) {
        return showtimes.map((show) => {
          const price = show.price != null
            ? `<span class="price">${escapeHtml(show.price)} ${escapeHtml(show.currency || "EGP")}</span>`
            : `<span class="unavailable">السعر غير متاح</span>`;
          const experience = show.experience ? ` · ${escapeHtml(show.experience)}` : "";
          return `<span class="time">${escapeHtml(show.time)} · ${price}${experience}</span>`;
        }).join("");
      }

      function filteredCinemas(day) {
        const radiusKm = Number(elements.radius.value);
        const nearbyMode = Boolean(userLocation);
        return (day?.cinemas || [])
          .map((cinema) => ({ ...cinema, distanceKm: cinemaDistanceKm(cinema) }))
          .filter((cinema) => {
            if (nearbyMode) return cinema.distanceKm != null && cinema.distanceKm <= radiusKm;
            const matchesCity = !elements.city.value || cinema.location?.city?.id === elements.city.value;
            const matchesArea = !selectedAreaIds.size || selectedAreaIds.has(cinema.location?.area?.id);
            return matchesCity && matchesArea;
          });
      }

      function renderResults() {
        const movie = selectedMovie();
        const day = movie?.dates.find((item) => item.date === elements.date.value);
        if (!movie || !day) {
          elements.results.hidden = false;
          elements.results.textContent = "لا توجد مواعيد متاحة لهذا الاختيار.";
          return;
        }

        const radiusKm = Number(elements.radius.value);
        const nearbyMode = Boolean(userLocation);
        const cinemas = filteredCinemas(day)
          .sort((first, second) => nearbyMode ? first.distanceKm - second.distanceKm : 0);

        elements.results.hidden = false;
        elements.results.innerHTML = `
          <div class="summary">
            <div class="movie-heading">
              ${movie.poster ? `<img class="poster" src="${escapeHtml(movie.poster)}" alt="بوستر ${escapeHtml(movie.title)}" loading="lazy">` : ""}
              <div><h2>${escapeHtml(movie.title)}</h2><span class="muted">${escapeHtml(formatDate(day.date))}</span></div>
            </div>
            <span class="muted">${cinemas.length} سينما${nearbyMode ? ` قريبة منك في نطاق ${escapeHtml(radiusKm)} كم` : ""}</span>
          </div>
          <div>${cinemas.length ? cinemas.map((cinema) => {
            const locationText = [cinema.location?.area?.name, cinema.location?.city?.name].filter(Boolean).join("، ") || "الموقع غير مصنف";
            return `<article class="cinema">
              <div class="cinema-head"><h3>${escapeHtml(cinema.theater || cinema.name)}</h3><span class="cinema-place"><span class="location">${escapeHtml(locationText)}</span>${cinema.distanceKm != null ? `<span class="distance">📍 ${escapeHtml(formatDistance(cinema.distanceKm))}</span>` : ""}</span></div>
              ${cinema.address ? `<div class="muted">${escapeHtml(cinema.address)}</div>` : ""}
              <div class="times">${renderTimes(cinema.showtimes)}</div>
              ${cinema.bookingUrl ? `<p><a href="${escapeHtml(cinema.bookingUrl)}" target="_blank" rel="noreferrer">الحجز على elCinema</a></p>` : ""}
            </article>`;
          }).join("") : `<p class="muted">${nearbyMode ? `لا توجد سينمات تعرض الفيلم داخل نطاق ${escapeHtml(radiusKm)} كم. جرّب نطاقًا أكبر.` : "لا توجد سينمات مطابقة للمكان المختار."}</p>`}</div>`;

        const resultData = { movie: { id: movie.id, title: movie.title }, date: day.date, nearbyRadiusKm: nearbyMode ? radiusKm : null, cinemas };
        elements.json.textContent = JSON.stringify(resultData, null, 2);
        elements.progress.textContent = nearbyMode
          ? `تم ترتيب ${cinemas.length} سينما من الأقرب للأبعد داخل نطاق ${radiusKm} كم.`
          : `تم عرض ${cinemas.length} سينما فورًا من النسخة المحفوظة.`;
      }

      function renderNearestShowing() {
        const movie = selectedMovie();
        const now = new Date();
        if (!movie) return;

        const filteredDays = movie.dates.map((day) => ({ ...day, cinemas: filteredCinemas(day) }));
        const showings = findUpcomingShowings(filteredDays, now, 3);
        elements.results.hidden = false;

        if (!showings.length) {
          elements.results.innerHTML = `
            <div class="summary">
              <div class="movie-heading">
                ${movie.poster ? `<img class="poster" src="${escapeHtml(movie.poster)}" alt="بوستر ${escapeHtml(movie.title)}" loading="lazy">` : ""}
                <div><h2>${escapeHtml(movie.title)}</h2><span class="muted">لا توجد حفلات لاحقة للوقت الحالي ضمن المكان المختار.</span></div>
              </div>
            </div>
            <p class="muted">جرّب توسيع نطاق المسافة، تغيير المناطق، أو اختيار فيلم آخر.</p>`;
          elements.json.textContent = JSON.stringify({ movie: { id: movie.id, title: movie.title }, searchedAt: now.toISOString(), showings: [] }, null, 2);
          elements.progress.textContent = "لم يتم العثور على ميعاد قادم في البيانات المحفوظة.";
          return;
        }

        const nearest = showings[0];
        const cinema = nearest.cinema;
        const showtime = nearest.showtime;
        const locationText = [cinema.location?.area?.name, cinema.location?.city?.name].filter(Boolean).join("، ") || "الموقع غير مصنف";
        const price = showtime.price != null
          ? `<span class="price">${escapeHtml(showtime.price)} ${escapeHtml(showtime.currency || "EGP")}</span>`
          : `<span class="unavailable">السعر غير متاح</span>`;
        const alternatives = showings.slice(1);

        elements.results.innerHTML = `
          <div class="summary">
            <div class="movie-heading">
              ${movie.poster ? `<img class="poster" src="${escapeHtml(movie.poster)}" alt="بوستر ${escapeHtml(movie.title)}" loading="lazy">` : ""}
              <div><h2>${escapeHtml(movie.title)}</h2><span class="muted">أقرب حفلة بعد الوقت الحالي</span></div>
            </div>
          </div>
          <article class="recommendation">
            <div class="recommendation-label">أفضل ميعاد متاح الآن · ${escapeHtml(formatWaitingTime(nearest.startsAtTimestamp - now.getTime()))}</div>
            <div class="recommendation-time">${escapeHtml(formatShowingDate(nearest.startsAt))}</div>
            <h3>${escapeHtml(cinema.theater || cinema.name)}</h3>
            <div class="recommendation-details">
              <span class="location">${escapeHtml(locationText)}</span>
              ${cinema.distanceKm != null ? `<span class="distance">📍 ${escapeHtml(formatDistance(cinema.distanceKm))}</span>` : ""}
              <span>${price}</span>
              ${showtime.experience ? `<span>${escapeHtml(showtime.experience)}</span>` : ""}
            </div>
            ${cinema.address ? `<p class="muted">${escapeHtml(cinema.address)}</p>` : ""}
            ${cinema.bookingUrl ? `<p><a href="${escapeHtml(cinema.bookingUrl)}" target="_blank" rel="noreferrer">احجز هذه الحفلة على elCinema</a></p>` : ""}
          </article>
          ${alternatives.length ? `<div class="alternatives"><h3>أقرب بدائل بعدها</h3>${alternatives.map((showing) => {
            const alternativePrice = showing.showtime.price != null
              ? `${escapeHtml(showing.showtime.price)} ${escapeHtml(showing.showtime.currency || "EGP")}`
              : "السعر غير متاح";
            return `<div class="alternative"><span><strong>${escapeHtml(showing.cinema.theater || showing.cinema.name)}</strong> · ${escapeHtml(formatShowingDate(showing.startsAt))}</span><span class="muted">${alternativePrice}${showing.cinema.distanceKm != null ? ` · ${escapeHtml(formatDistance(showing.cinema.distanceKm))}` : ""}</span></div>`;
          }).join("")}</div>` : ""}`;

        elements.json.textContent = JSON.stringify({
          movie: { id: movie.id, title: movie.title },
          searchedAt: now.toISOString(),
          showings: showings.map((showing) => ({
            startsAt: showing.startsAt,
            cinema: showing.cinema.theater || showing.cinema.name,
            distanceKm: showing.cinema.distanceKm,
            price: showing.showtime.price,
            currency: showing.showtime.currency,
            experience: showing.showtime.experience,
          })),
        }, null, 2);
        elements.progress.textContent = `تم حساب أقرب ميعاد من الساعة ${new Intl.DateTimeFormat("ar-EG", { timeStyle: "short", timeZone: "Africa/Cairo" }).format(now)}.`;
      }

      function clearUserLocation(render = true) {
        userLocation = null;
        elements.radius.disabled = true;
        elements.clearLocation.hidden = true;
        elements.locate.textContent = "📍 استخدم موقعي";
        elements.locationStatus.textContent = "تم إلغاء استخدام الموقع. يمكنك اختيار المحافظة والمناطق يدويًا.";
        if (render && !elements.results.hidden) renderResults();
      }

      function locateUser() {
        if (!("geolocation" in navigator)) {
          elements.locationStatus.textContent = "المتصفح لا يدعم تحديد الموقع. استخدم اختيار المحافظة والمناطق.";
          return;
        }

        elements.locate.disabled = true;
        elements.locate.textContent = "جاري تحديد موقعك…";
        elements.locationStatus.textContent = "اسمح للموقع بالوصول لمكانك عند ظهور رسالة المتصفح.";
        navigator.geolocation.getCurrentPosition((position) => {
          userLocation = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
          };
          elements.city.value = "";
          loadAreas();
          elements.radius.disabled = false;
          elements.clearLocation.hidden = false;
          elements.locate.disabled = false;
          elements.locate.textContent = "📍 تحديث موقعي";
          const accuracy = Math.round(position.coords.accuracy);
          elements.locationStatus.textContent = `تم تحديد موقعك بدقة تقريبية ${accuracy} متر. موقعك لم يتم حفظه أو إرساله.`;
          renderResults();
        }, (error) => {
          const messages = {
            1: "تم رفض إذن الموقع. فعّله من إعدادات المتصفح أو استخدم اختيار المناطق.",
            2: "تعذّر معرفة موقعك حاليًا. جرّب مرة أخرى أو استخدم اختيار المناطق.",
            3: "استغرق تحديد الموقع وقتًا طويلًا. جرّب مرة أخرى.",
          };
          elements.locate.disabled = false;
          elements.locate.textContent = "📍 استخدم موقعي";
          elements.locationStatus.textContent = messages[error.code] || "حدث خطأ أثناء تحديد الموقع.";
        }, {
          enableHighAccuracy: false,
          timeout: 10000,
          maximumAge: 300000,
        });
      }

      async function loadSnapshot(force = false) {
        elements.reload.disabled = true;
        elements.progress.textContent = "جاري تحميل البيانات المحفوظة…";
        try {
          const suffix = force ? `?v=${Date.now()}` : "";
          const response = await fetch(`./data/snapshot.json${suffix}`, { cache: force ? "reload" : "default" });
          if (!response.ok) throw new Error(`لم يتم إنشاء ملف البيانات بعد (HTTP ${response.status}).`);
          snapshot = await response.json();
          if (!Array.isArray(snapshot.movies) || !snapshot.generatedAt) throw new Error("ملف البيانات غير صالح.");

          elements.movie.innerHTML = snapshot.movies
            .map((item) => `<option value="${item.id}">${escapeHtml(item.title)}</option>`)
            .join("");
          elements.city.innerHTML = `<option value="">كل المحافظات والمدن</option>` + snapshot.locations.cities
            .map((item) => `<option value="${item.id}">${escapeHtml(item.nameAr || item.nameEn)}</option>`)
            .join("");
          elements.movie.disabled = false;
          elements.city.disabled = false;
          elements.search.disabled = false;
          elements.nearest.disabled = false;
          elements.locate.disabled = false;
          elements.freshness.textContent = `آخر تحديث: ${formatUpdatedAt(snapshot.generatedAt)}`;
          elements.stats.textContent = `${snapshot.stats.movies} فيلم · ${snapshot.stats.cinemas} سينما · ${snapshot.stats.sessions} ميعاد`;
          loadDates();
          loadAreas();
          elements.progress.textContent = "البيانات جاهزة — البحث والفلترة هيظهروا فورًا.";
        } catch (error) {
          elements.freshness.textContent = "البيانات غير متاحة";
          elements.progress.textContent = `${error.message} شغّل npm run snapshot مرة أولى.`;
        } finally {
          elements.reload.disabled = false;
        }
      }

      elements.movie.addEventListener("change", loadDates);
      elements.city.addEventListener("change", () => {
        if (userLocation) clearUserLocation(false);
        loadAreas();
      });
      elements.areaToggle.addEventListener("click", () => {
        elements.areaMenu.hidden = !elements.areaMenu.hidden;
      });
      elements.areaMenu.addEventListener("change", (event) => {
        if (!event.target.matches('input[type="checkbox"]')) return;
        if (event.target.checked) selectedAreaIds.add(event.target.value);
        else selectedAreaIds.delete(event.target.value);
        updateAreaLabel();
      });
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".area-picker")) elements.areaMenu.hidden = true;
      });
      elements.search.addEventListener("click", renderResults);
      elements.nearest.addEventListener("click", renderNearestShowing);
      elements.locate.addEventListener("click", locateUser);
      elements.clearLocation.addEventListener("click", () => clearUserLocation());
      elements.radius.addEventListener("change", () => {
        if (userLocation) renderResults();
      });
      elements.reload.addEventListener("click", () => loadSnapshot(true));
      updateCurrentTime();
      window.setInterval(updateCurrentTime, 30000);
      loadSnapshot();
    </script>
  </body>
</html>
